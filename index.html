<!doctype html>
<html class="no-js" lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>I Love You Primon - RPG</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="RPG top-down em pixel art para web.">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>
  <div id="app" class="app">
    <main class="viewport" aria-live="polite">
      <section id="main-menu" class="scene scene--menu is-active" aria-label="Menu principal">
        <div class="menu-frame">
          <div class="menu-layout">
            <div class="menu-hero">
              <img class="menu-title-char" src="img/title-char.png" alt="Personagem do título">
            </div>
            <div class="menu-panel">
              <img class="menu-title" src="img/title.png" alt="I Love You Primon">
              <div class="menu-actions">
                <button class="menu-button" type="button" data-action="start">
                  <img src="img/template-start.png" alt="Start Game">
                </button>
                <button class="menu-button" type="button" data-action="options">
                  <img src="img/game-options.png" alt="Options">
                </button>
              </div>
              <p class="menu-hint">Pressione Enter para começar</p>
            </div>
          </div>
        </div>
      </section>

      <section id="game-scene" class="scene scene--game" aria-label="Jogo" aria-hidden="true">
        <div class="game-frame">
          <canvas id="game-canvas" width="320" height="180"></canvas>
          <p class="game-hint">WASD ou setas para mover</p>
        </div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
